name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build Windows installer and updater metadata
        run: npx electron-builder --config electron-builder.config.cjs --win nsis --publish never
        env:
          RITIM_GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Create GitHub release
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $assets = @(
            "release/Ritim-Setup-$version.exe"
            "release/Ritim-Setup-$version.exe.blockmap"
            "release/latest.yml"
          )
          gh release create "$env:GITHUB_REF_NAME" $assets --repo "$env:GITHUB_REPOSITORY" --verify-tag --title "Ritim $version" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    needs: windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Sync Android project
        run: npm run android:sync
        env:
          VITE_GITHUB_REPOSITORY: ${{ github.repository }}
      - run: ./gradlew assembleDebug
        working-directory: android
      - name: Attach Android test APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "Ritim-Android-${GITHUB_REF_NAME}.apk"
          gh release upload "$GITHUB_REF_NAME" "Ritim-Android-${GITHUB_REF_NAME}.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
