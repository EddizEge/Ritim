name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build Windows installer and updater metadata
        run: npx electron-builder --config electron-builder.config.cjs --win nsis --publish never
        env:
          RITIM_GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Create GitHub release
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $assets = @(
            "release/Ritim-Setup-$version.exe"
            "release/Ritim-Setup-$version.exe.blockmap"
            "release/latest.yml"
          )
          gh release create "$env:GITHUB_REF_NAME" $assets --repo "$env:GITHUB_REPOSITORY" --verify-tag --title "Ritim $version" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    needs: windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Sync Android project
        run: npm run android:sync
        env:
          VITE_GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Configure persistent Android signing
        shell: bash
        run: |
          test -n '${{ secrets.RITIM_ANDROID_KEYSTORE_BASE64 }}'
          echo '${{ secrets.RITIM_ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > "$RUNNER_TEMP/ritim-release.jks"
          echo "RITIM_ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/ritim-release.jks" >> "$GITHUB_ENV"
          echo 'RITIM_ANDROID_KEYSTORE_PASSWORD=${{ secrets.RITIM_ANDROID_KEYSTORE_PASSWORD }}' >> "$GITHUB_ENV"
          echo 'RITIM_ANDROID_KEY_ALIAS=${{ secrets.RITIM_ANDROID_KEY_ALIAS }}' >> "$GITHUB_ENV"
          echo 'RITIM_ANDROID_KEY_PASSWORD=${{ secrets.RITIM_ANDROID_KEY_PASSWORD }}' >> "$GITHUB_ENV"
      - run: ./gradlew assembleDebug
        working-directory: android
      - name: Verify Android package version
        shell: bash
        run: |
          expected_version="$(node -p "require('./package.json').version")"
          actual_version="$(apkanalyzer manifest version-name android/app/build/outputs/apk/debug/app-debug.apk)"
          test "$actual_version" = "$expected_version" || {
            echo "APK version mismatch: expected $expected_version, got $actual_version"
            exit 1
          }
          expected_certificate="6a5b01605a4a767da6d21e199d805d8ea230c4da01dcc4335bd18891f36c4458"
          actual_certificate="$(apksigner verify --print-certs android/app/build/outputs/apk/debug/app-debug.apk | awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print $2; exit }')"
          test "$actual_certificate" = "$expected_certificate" || {
            echo "APK signing certificate mismatch"
            exit 1
          }
      - name: Attach Android test APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "Ritim-Android-${GITHUB_REF_NAME}.apk"
          gh release upload "$GITHUB_REF_NAME" "Ritim-Android-${GITHUB_REF_NAME}.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
